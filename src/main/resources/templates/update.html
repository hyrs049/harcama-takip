
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Harcamayı Güncelle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">✏ Harcamayı Güncelle</h1>

    <form class="row g-3" th:action="@{/update/{id}(id=${expense.id})}" method="post" th:object="${expense}">
        <div class="col-md-6">
            <input type="text" name="description" class="form-control" th:value="${expense.description}" required>
        </div>
        <div class="col-md-3">
            <input type="number" name="amount" class="form-control" th:value="${expense.amount}" step="0.01" min="0" required>
        </div>
        <div class="col-md-3">
            <select name="category" class="form-select">
                <option value="Yemek" th:selected="${expense.category == 'Yemek'}">🍔 Yemek</option>
                <option value="Ulaşım" th:selected="${expense.category == 'Ulaşım'}">🚌 Ulaşım</option>
                <option value="Eğitim" th:selected="${expense.category == 'Eğitim'}">📚 Eğitim</option>
                <option value="Eğlence" th:selected="${expense.category == 'Eğlence'}">🎮 Eğlence</option>
                <option value="Sağlık" th:selected="${expense.category == 'Sağlık'}">💊 Sağlık</option>
                <option value="Diğer" th:selected="${expense.category == 'Diğer'}">📦 Diğer</option>
            </select>
        </div>
        <div class="col-md-4">
            <input type="date" name="date" class="form-control"
                   th:value="${#dates.format(expense.expenseDate,'yyyy-MM-dd')}">
        </div>
        <div class="col-md-12">
            <button type="submit" class="btn btn-warning w-100">Güncelle</button>
        </div>
    </form>
</div>
</body>
</html>
